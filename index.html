<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #343541;
            --chat-bg: #444654;
            --text-color: #ececf1;
            --input-bg: #40414f;
            --border-color: rgba(255,255,255,0.1);
            --accent: #19c37d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .settings-btn:hover {
            color: var(--accent);
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
        }

        .message-wrapper.bot {
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .message-content {
            display: flex;
            gap: 20px;
            max-width: 800px;
            width: 100%;
            line-height: 1.6;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar.user { background-color: #5436da; }
        .avatar.bot { background-color: var(--accent); }

        .text-content {
            flex: 1;
            min-width: 0; /* Prevents overflow in flex child */
        }

        .text-content pre {
            background-color: #000;
            padding: 1em;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .text-content code {
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            background-color: rgba(255,255,255,0.1);
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }

        .text-content pre code {
            background-color: transparent;
            padding: 0;
        }
        
        .text-content p { margin-bottom: 10px; }
        .text-content p:last-child { margin-bottom: 0; }

        /* Input Area */
        .input-container {
            padding: 20px;
            background-color: var(--bg-color);
            background-image: linear-gradient(180deg, rgba(53,55,64,0), #353740 58.85%);
            position: sticky;
            bottom: 0;
            display: flex;
            justify-content: center;
        }

        .input-box {
            position: relative;
            max-width: 800px;
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: flex-end;
            padding: 10px 15px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            padding-right: 40px;
            outline: none;
            line-height: 1.5;
            overflow-y: hidden;
        }

        .send-btn {
            position: absolute;
            right: 10px;
            bottom: 10px;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .send-btn:disabled { color: gray; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: var(--bg-color);
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .modal h2 { margin-bottom: 20px; font-size: 1.3rem; }

        .input-group { margin-bottom: 15px; }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: white;
            outline: none;
        }

        .input-group input:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel { background: transparent; color: white; border: 1px solid var(--border-color); }
        .btn-save { background: var(--accent); color: white; }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            color: #888;
            font-size: 0.9rem;
            font-style: italic;
        }
        .typing-indicator i { margin-right: 5px; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .error-text { color: #ef4444; }

        @media (max-width: 768px) {
            .message-wrapper { padding: 15px 10px; }
            .message-content { gap: 10px; }
            .input-container { padding: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Terminal</h1>
        <button class="settings-btn" id="openSettings" title="Settings">
            <i class="fas fa-cog"></i>
        </button>
    </header>

    <div id="chat-container">
        </div>

    <div class="input-container">
        <div class="input-box">
            <textarea id="userInput" placeholder="Send a message..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" title="Send">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Configuration</h2>
            <div class="input-group">
                <label for="apiKey">OpenRouter API Key</label>
                <input type="password" id="apiKey" placeholder="sk-or-v1-...">
            </div>
            <div class="input-group">
                <label for="modelId">Model ID</label>
                <input type="text" id="modelId" placeholder="mistralai/mistral-7b-instruct:free">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancelSettings">Cancel</button>
                <button class="btn btn-save" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const settingsModal = document.getElementById('settingsModal');
        const openSettingsBtn = document.getElementById('openSettings');
        const cancelSettingsBtn = document.getElementById('cancelSettings');
        const saveSettingsBtn = document.getElementById('saveSettings');
        const apiKeyInput = document.getElementById('apiKey');
        const modelIdInput = document.getElementById('modelId');

        // State
        let chatHistory = [];
        const DEFAULT_MODEL = "mistralai/mistral-7b-instruct:free";

        // Initialize Settings
        function loadSettings() {
            const savedKey = localStorage.getItem('or_api_key') || '';
            const savedModel = localStorage.getItem('or_model_id') || DEFAULT_MODEL;
            apiKeyInput.value = savedKey;
            modelIdInput.value = savedModel;
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim() === "") {
                this.style.height = 'auto'; // reset on empty
            }
        });

        // Enter to send (Shift+Enter for new line)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', handleSend);

        // Modal Logic
        openSettingsBtn.addEventListener('click', () => {
            loadSettings();
            settingsModal.style.display = 'flex';
        });

        cancelSettingsBtn.addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        saveSettingsBtn.addEventListener('click', () => {
            localStorage.setItem('or_api_key', apiKeyInput.value.trim());
            localStorage.setItem('or_model_id', modelIdInput.value.trim() || DEFAULT_MODEL);
            settingsModal.style.display = 'none';
        });

        function appendMessage(role, content, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;
            
            const iconClass = role === 'bot' ? 'fa-user-secret' : 'fa-user';
            const parsedContent = role === 'bot' && !isError ? marked.parse(content) : content;

            wrapper.innerHTML = `
                <div class="message-content">
                    <div class="avatar ${role}">
                        <i class="fas ${iconClass}" style="color: white; font-size: 14px;"></i>
                    </div>
                    <div class="text-content ${isError ? 'error-text' : ''}">
                        ${role === 'user' ? `<p>${content.replace(/\n/g, '<br>')}</p>` : parsedContent}
                    </div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        function createTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';
            wrapper.id = 'typing-indicator-wrapper';
            wrapper.innerHTML = `
                <div class="message-content">
                    <div class="avatar bot">
                        <i class="fas fa-user-secret" style="color: white; font-size: 14px;"></i>
                    </div>
                    <div class="text-content">
                        <div class="typing-indicator" style="display: block;">
                            <i class="fas fa-terminal"></i> Bypassing filters...
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('or_api_key');
            const modelId = localStorage.getItem('or_model_id') || DEFAULT_MODEL;

            if (!apiKey) {
                alert("Please set your OpenRouter API Key in the settings first.");
                settingsModal.style.display = 'flex';
                return;
            }

            // UI Updates
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            userInput.disabled = true;

            appendMessage('user', text);
            chatHistory.push({ role: "user", content: text });

            const typingIndicator = createTypingIndicator();

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Custom Web Client',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelId,
                        messages: chatHistory
                    })
                });

                const data = await response.json();
                typingIndicator.remove();

                if (!response.ok) {
                    throw new Error(data.error?.message || `HTTP Error ${response.status}: ${response.statusText}`);
                }

                if (data.choices && data.choices.length > 0) {
                    const botReply = data.choices[0].message.content;
                    appendMessage('bot', botReply);
                    chatHistory.push({ role: "assistant", content: botReply });
                } else {
                    throw new Error("No response choices returned from API.");
                }

            } catch (error) {
                typingIndicator.remove();
                appendMessage('bot', `API Error: ${error.message}`, true);
                // Remove the last user message from history so they can try again without confusing the context
                chatHistory.pop();
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        // Init
        loadSettings();
    </script>
</body>
</html>
