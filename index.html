<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#030712">
    <title>Magic Eraser Pro (Offline AI)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@imgly/background-removal@1.2.0/dist/browser/imglyRemoveBackground.umd.js"></script>
    
    <style>
        body { 
            background-color: #030712; 
        }
        
        /* Cyberpunk Neon Effects */
        .cyber-glow-purple { 
            box-shadow: 0 0 15px rgba(168,85,247,0.4), inset 0 0 10px rgba(168,85,247,0.1); 
            border-color: #a855f7; 
        }
        .cyber-glow-green { 
            box-shadow: 0 0 15px rgba(34,197,94,0.5), inset 0 0 10px rgba(34,197,94,0.2); 
            border-color: #22c55e; 
        }
        .cyber-text-purple { 
            text-shadow: 0 0 8px rgba(168,85,247,0.8); 
        }
        .cyber-text-green { 
            text-shadow: 0 0 8px rgba(34,197,94,0.8); 
        }
        
        /* Spinner */
        .loader {
            border-top-color: #a855f7;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Checkerboard background for transparent results */
        .bg-checkerboard {
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAnv37v3PwsLCiC6FzRCRJmEaGfBpwLQPAJpVB0C1G+T3AAAAAElFTkSuQmCC');
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 font-sans text-gray-200">

    <main class="w-full max-w-md mx-auto space-y-6">
        
        <header class="text-center mt-4 mb-8">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-green-400 cyber-text-purple uppercase">
                Magic Eraser Pro
            </h1>
            <p class="text-[10px] font-mono text-purple-300 mt-2 tracking-widest">[ OFFLINE AI ENGINE ]</p>
        </header>

        <label class="relative block w-full border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all duration-300 hover:bg-gray-900 cyber-glow-purple bg-gray-900/50" id="drop-zone">
            <input type="file" id="file-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            <div class="space-y-3 pointer-events-none">
                <svg class="mx-auto h-12 w-12 text-purple-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <p class="text-sm font-medium text-gray-300">Tap to upload image</p>
                <p class="text-xs text-gray-500">JPG, PNG, WEBP</p>
            </div>
        </label>

        <div id="preview-container" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4">
                
                <div class="flex flex-col space-y-2">
                    <span class="text-[10px] font-mono text-gray-400 text-center uppercase tracking-wider">Before</span>
                    <div class="aspect-square rounded-lg overflow-hidden border border-gray-700 bg-gray-800 flex items-center justify-center">
                        <img id="original-preview" class="object-cover w-full h-full" alt="Original preview">
                    </div>
                </div>

                <div class="flex flex-col space-y-2">
                    <span class="text-[10px] font-mono text-gray-400 text-center uppercase tracking-wider">After</span>
                    <div class="aspect-square rounded-lg overflow-hidden border border-gray-700 bg-checkerboard flex items-center justify-center relative">
                        <img id="result-preview" class="object-contain w-full h-full hidden z-10" alt="Result preview">
                        
                        <div id="loading-spinner" class="hidden absolute inset-0 z-20 bg-gray-950/80 flex items-center justify-center flex-col backdrop-blur-sm">
                            <div class="loader border-4 border-gray-700 rounded-full w-10 h-10 mb-2"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="status-container" class="hidden text-center p-3 rounded-lg bg-gray-900/80 border border-gray-800">
            <p id="status-text" class="text-xs font-mono text-purple-300 animate-pulse"></p>
        </div>

        <div class="space-y-4 pt-2 pb-8">
            <button id="remove-btn" class="w-full py-4 px-6 rounded-lg font-bold text-black bg-green-400 transition-all cyber-glow-green hover:bg-green-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none hidden flex items-center justify-center space-x-2">
                <span>Remove Background 🪄</span>
            </button>
            
            <a id="download-btn" class="w-full py-4 px-6 rounded-lg font-bold text-white bg-purple-600 transition-all cyber-glow-purple hover:bg-purple-500 hidden flex items-center justify-center space-x-2 text-center" download="magic_eraser_pro.png">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span>Download HD</span>
            </a>
        </div>
        
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const originalPreview = document.getElementById('original-preview');
        const resultPreview = document.getElementById('result-preview');
        const removeBtn = document.getElementById('remove-btn');
        const downloadBtn = document.getElementById('download-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const loadingSpinner = document.getElementById('loading-spinner');

        let currentFile = null;

        // Handle Image Upload
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                currentFile = e.target.files[0];
                
                // Reset UI states
                resultPreview.classList.add('hidden');
                resultPreview.src = '';
                downloadBtn.classList.add('hidden');
                statusContainer.classList.add('hidden');
                
                // Show original image
                const objectUrl = URL.createObjectURL(currentFile);
                originalPreview.src = objectUrl;
                
                // Reveal components
                previewContainer.classList.remove('hidden');
                removeBtn.classList.remove('hidden');
                removeBtn.disabled = false;
            }
        });

        // Handle AI Background Removal
        removeBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // Trigger Loading UI
            removeBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            resultPreview.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            
            statusContainer.classList.remove('hidden');
            statusText.textContent = "Loading AI Model... (May take 10-20 seconds the first time)";
            statusText.className = "text-xs font-mono animate-pulse cyber-text-purple text-purple-400";

            try {
                // CORE LOGIC 
                const config = {
                    publicPath: "https://unpkg.com/@imgly/background-removal@1.2.0/dist/"
                };
                
                // Update status when processing begins
                setTimeout(() => {
                    if (loadingSpinner.classList.contains('hidden')) return;
                    statusText.textContent = "Processing Image... AI is executing 🧠";
                }, 3000); // Slight delay to give illusion of model load vs processing

                const imageBlob = await imglyRemoveBackground(currentFile, config);
                const url = URL.createObjectURL(imageBlob);
                
                // Success UI Update
                resultPreview.src = url;
                resultPreview.classList.remove('hidden');
                
                downloadBtn.href = url;
                downloadBtn.download = `magic-eraser-${Date.now()}.png`;
                downloadBtn.classList.remove('hidden');
                
                statusText.textContent = "Background removed successfully! ✨";
                statusText.className = "text-xs font-mono cyber-text-green text-green-400";

            } catch (error) {
                console.error("AI Error:", error);
                statusText.textContent = "Error: System failure. Try a different image.";
                statusText.className = "text-xs font-mono text-red-500";
            } finally {
                loadingSpinner.classList.add('hidden');
                removeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
