<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #343541;
            --bg-chat: #444654;
            --text-main: #ececf1;
            --text-muted: #c5c5d2;
            --accent: #19c37d;
            --border: #565869;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .settings-btn:hover {
            color: var(--text-main);
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            padding: 24px 20px;
            gap: 15px;
            line-height: 1.6;
        }

        .message.ai {
            background-color: var(--bg-chat);
        }

        .message.user {
            background-color: var(--bg-main);
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .avatar.user-avatar { background-color: #5436da; color: white; }
        .avatar.ai-avatar { background-color: var(--accent); color: white; }

        .content {
            flex: 1;
            min-width: 0; /* for code block wrapping */
            overflow-wrap: break-word;
        }

        .content pre {
            background-color: #0d0d0d;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .content code {
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }

        .content p { margin-bottom: 10px; }
        .content p:last-child { margin-bottom: 0; }

        /* Input Area */
        .input-container {
            padding: 20px;
            background-color: var(--bg-main);
            background-image: linear-gradient(180deg, rgba(53, 55, 64, 0), #353740 58.85%);
            border-top: 1px solid transparent;
        }

        .input-box {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            background-color: #40414f;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            resize: none;
            max-height: 200px;
            min-height: 24px;
            padding: 5px 0;
            outline: none;
            font-size: 1rem;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #8e8ea0;
        }

        .send-btn {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            padding: 5px;
            font-size: 1.2rem;
            transition: color 0.2s;
            margin-left: 10px;
        }

        .send-btn.active { color: var(--accent); }

        /* Typing Indicator */
        #typing-indicator {
            display: none;
            padding: 10px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            text-align: center;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background-color: var(--bg-chat);
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .modal h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            outline: none;
        }

        .modal input:focus { border-color: var(--accent); }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-save {
            background-color: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Chat</h1>
        <button class="settings-btn" id="openSettings" title="Settings">
            <i class="fas fa-cog"></i>
        </button>
    </header>

    <div id="chat-container">
        </div>
    
    <div id="typing-indicator">Bypassing filters...</div>

    <div class="input-container">
        <div class="input-box">
            <textarea id="userInput" rows="1" placeholder="Send a message..."></textarea>
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Settings</h2>
            <label for="apiKeyInput" style="display:block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">OpenRouter API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="closeSettings">Cancel</button>
                <button class="btn btn-save" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // Modal Elements
        const modal = document.getElementById('settingsModal');
        const openSettingsBtn = document.getElementById('openSettings');
        const closeSettingsBtn = document.getElementById('closeSettings');
        const saveSettingsBtn = document.getElementById('saveSettings');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // State
        let chatHistory = [];
        const MODEL = 'gryphe/mythomax-l2-13b:free';

        // Configure marked.js to sanitize somewhat but allow code blocks
        marked.setOptions({ breaks: true });

        // Initialize
        function init() {
            const savedKey = localStorage.getItem('openrouter_api_key');
            if (!savedKey) {
                modal.style.display = 'flex';
            }
            appendMessage('ai', "Hello. I am ready. How can I help you today?");
        }

        // Settings Modal Logic
        openSettingsBtn.addEventListener('click', () => {
            apiKeyInput.value = localStorage.getItem('openrouter_api_key') || '';
            modal.style.display = 'flex';
        });

        closeSettingsBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        saveSettingsBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('openrouter_api_key', key);
            } else {
                localStorage.removeItem('openrouter_api_key');
            }
            modal.style.display = 'none';
        });

        // Textarea Auto-resize & Event Listeners
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            
            if (this.value.trim() !== '') {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Core Chat Logic
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('openrouter_api_key');
            if (!apiKey) {
                alert('Please set your OpenRouter API Key in the settings first.');
                modal.style.display = 'flex';
                return;
            }

            // Update UI
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.classList.remove('active');
            
            // Update History
            chatHistory.push({ role: 'user', content: text });

            // Show Loading
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': 'https://github.com'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: chatHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                // Update History
                chatHistory.push({ role: 'assistant', content: aiResponseText });

                // Update UI
                appendMessage('ai', aiResponseText);

            } catch (error) {
                console.error(error);
                appendMessage('ai', `**Error:** ${error.message}. Please check your API key and connection.`);
            } finally {
                typingIndicator.style.display = 'none';
            }
        }

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const isUser = sender === 'user';
            const iconClass = isUser ? 'fa-user' : 'fa-robot';
            const avatarClass = isUser ? 'user-avatar' : 'ai-avatar';

            // Parse markdown for AI, raw text for user
            const contentHtml = isUser 
                ? `<p>${text.replace(/\n/g, '<br>')}</p>` 
                : marked.parse(text);

            messageDiv.innerHTML = `
                <div class="avatar ${avatarClass}">
                    <i class="fas ${iconClass}"></i>
                </div>
                <div class="content">
                    ${contentHtml}
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Run
        init();
    </script>
</body>
</html>
