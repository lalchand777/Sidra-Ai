<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>NeonNoir Downloader</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      background-color: #050505;
      background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #050505 70%);
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    
    .neon-text {
      color: #fff;
      text-shadow: 0 0 5px #a855f7, 0 0 10px #a855f7, 0 0 20px #8b5cf6;
    }
    
    .neon-input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #3b82f6;
      box-shadow: 0 0 5px rgba(59, 130, 246, 0.3), inset 0 0 10px rgba(59, 130, 246, 0.1);
      transition: all 0.3s ease;
    }
    
    .neon-input:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.6), inset 0 0 10px rgba(168, 85, 247, 0.2);
    }
    
    .neon-btn {
      background: linear-gradient(135deg, #7e22ce, #2563eb);
      box-shadow: 0 0 15px rgba(126, 34, 206, 0.6), 0 0 30px rgba(37, 99, 235, 0.4);
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 800;
    }
    
    .neon-btn:active {
      transform: scale(0.96);
      box-shadow: 0 0 5px rgba(126, 34, 206, 0.8), 0 0 15px rgba(37, 99, 235, 0.6);
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>

  <script>
    const manifest = {
      name: "NeonNoir Downloader",
      short_name: "NeonNoir",
      start_url: ".",
      display: "standalone",
      background_color: "#050505",
      theme_color: "#8b5cf6",
      icons: [{
        src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzA1MDUwNSIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNTAiIHI9IjM1IiBmaWxsPSJub25lIiBzdHJva2U9IiM4YjVjZjYiIHN0cm9rZS13aWR0aD0iOCIvPjwvc3ZnPg==",
        sizes: "192x192",
        type: "image/svg+xml"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    document.write(`<link rel="manifest" href="${manifestURL}">`);
  </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4">

  <header class="w-full max-w-md pt-8 pb-4 text-center">
    <h1 class="text-3xl font-black tracking-wider neon-text mb-2">NEONNOIR</h1>
    <p class="text-blue-400 text-sm tracking-widest font-mono">UNIVERSAL DOWNLOADER</p>
  </header>

  <main class="w-full max-w-md flex flex-col gap-6 flex-grow justify-center relative z-10">
    
    <div class="glass-panel p-6 rounded-2xl flex flex-col gap-5 shadow-2xl">
      <div class="flex flex-col gap-2">
        <label for="urlInput" class="text-xs font-mono text-gray-400 uppercase tracking-wider ml-1">Target URL</label>
        <input 
          type="url" 
          id="urlInput" 
          placeholder="Paste Insta, TikTok, X, or Reddit link..." 
          class="neon-input w-full p-4 rounded-xl text-white placeholder-gray-500 font-mono text-sm"
          autocomplete="off"
        >
      </div>

      <button 
        id="downloadBtn" 
        class="neon-btn w-full py-4 rounded-xl text-white text-lg flex items-center justify-center gap-2"
        onclick="initiateDownload()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Download Now
      </button>

      <div id="statusArea" class="text-center min-h-[24px] font-mono text-sm transition-opacity duration-300 opacity-0">
        </div>

      <div id="resultArea" class="hidden flex flex-col gap-3 mt-2 animate-pulse">
        <a 
          id="finalDownloadLink" 
          href="#" 
          target="_blank"
          class="bg-green-500/20 border border-green-500 text-green-400 py-3 rounded-xl text-center font-bold tracking-wide hover:bg-green-500/30 transition-colors"
          download
        >
          SAVE FILE TO DEVICE
        </a>
      </div>
    </div>
    
    <button id="installAppBtn" class="hidden mx-auto border border-purple-500 text-purple-400 text-xs font-mono py-2 px-4 rounded-full hover:bg-purple-900/30 transition-colors">
      [ INSTALL APP TO HOMESCREEN ]
    </button>
  </main>

  <footer class="w-full max-w-md pb-6 text-center">
    <p class="text-gray-500 text-xs font-mono tracking-widest uppercase">
      100% Ad-Free • Private • Secure
    </p>
  </footer>

  <script>
    // Note: co.wuk.sh is used as requested, but api.cobalt.tools is the primary fallback for the Cobalt ecosystem.
    const COBALT_API_URL = 'https://co.wuk.sh/api/json'; 
    const FALLBACK_API_URL = 'https://api.cobalt.tools/api/json';

    const urlInput = document.getElementById('urlInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusArea = document.getElementById('statusArea');
    const resultArea = document.getElementById('resultArea');
    const finalDownloadLink = document.getElementById('finalDownloadLink');
    const installAppBtn = document.getElementById('installAppBtn');

    function updateStatus(message, colorClass) {
      statusArea.className = `text-center min-h-[24px] font-mono text-sm transition-opacity duration-300 opacity-100 ${colorClass}`;
      statusArea.textContent = message;
    }

    async function initiateDownload() {
      const targetUrl = urlInput.value.trim();
      
      if (!targetUrl) {
        updateStatus('> ERROR: Input payload is empty.', 'text-red-500');
        return;
      }

      // Basic URL validation
      try {
        new URL(targetUrl);
      } catch (e) {
        updateStatus('> ERROR: Invalid URL format.', 'text-red-500');
        return;
      }

      // Reset UI state
      resultArea.classList.add('hidden');
      downloadBtn.disabled = true;
      downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
      downloadBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg> Processing...
      `;
      updateStatus('> Initiating connection sequence...', 'text-blue-400');

      try {
        // Attempt Primary API Request
        let response = await fetch(COBALT_API_URL, {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ url: targetUrl })
        }).catch(() => null); // Catch network errors to trigger fallback

        // Fallback to official api.cobalt.tools instance if co.wuk.sh fails
        if (!response || !response.ok) {
           updateStatus('> Rerouting to fallback instance...', 'text-purple-400');
           response = await fetch(FALLBACK_API_URL, {
            method: 'POST',
            headers: {
              'Accept': 'application/json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ url: targetUrl })
          });
        }

        if (!response.ok) {
          throw new Error(`Server returned status: ${response.status}`);
        }

        const data = await response.json();

        if (data.status === 'error') {
          updateStatus(`> SERVER ERROR: ${data.text || 'Failed to process video'}`, 'text-red-500');
        } else if (data.url) {
          updateStatus('> SUCCESS: Media decrypted.', 'text-green-400');
          finalDownloadLink.href = data.url;
          resultArea.classList.remove('hidden');
        } else {
          updateStatus('> ERROR: Unexpected response signature.', 'text-red-500');
        }

      } catch (error) {
        console.error(error);
        updateStatus('> CONNECTION FAILED: Check URL or try again later.', 'text-red-500');
      } finally {
        // Restore Button State
        downloadBtn.disabled = false;
        downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        downloadBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg> Download Now
        `;
      }
    }

    // PWA Installation Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installAppBtn.classList.remove('hidden');
    });

    installAppBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installAppBtn.classList.add('hidden');
        }
        deferredPrompt = null;
      }
    });
  </script>
</body>
</html>
