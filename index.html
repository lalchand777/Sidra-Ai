<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Chat Hacker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glass: "rgba(255, 255, 255, 0.08)",
                        glassBorder: "rgba(255, 255, 255, 0.15)",
                        primary: "#8b5cf6", // Violet
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glassBorder);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Scrollbar hiding for chat */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Markdown Styles */
        .prose p { margin-bottom: 0.5em; }
        .prose ul { list-style-type: disc; margin-left: 1.2em; }
        .prose code { background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; color: #fbbf24; }
        .prose pre { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; overflow-x: auto; margin: 5px 0; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-anim { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col h-full relative">

    <header class="glass-panel rounded-b-2xl p-4 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-violet-500 to-fuchsia-500 flex items-center justify-center shadow-lg">
                <i class="fa-brands fa-youtube text-white text-sm"></i>
            </div>
            <h1 class="font-bold text-lg tracking-tight">YT Chat Hacker</h1>
        </div>
        <button onclick="toggleSettings()" class="w-10 h-10 rounded-full glass-input flex items-center justify-center hover:bg-white/10 active:scale-95 transition">
            <i class="fa-solid fa-gear text-gray-300"></i>
        </button>
    </header>

    <div id="url-section" class="p-4 z-10 shrink-0 transition-all duration-300">
        <div class="glass-panel p-1 rounded-xl flex gap-2">
            <input type="text" id="yt-url" placeholder="Paste YouTube URL..." class="bg-transparent border-none text-sm w-full px-3 py-3 focus:ring-0 text-white placeholder-gray-400">
            <button onclick="loadTranscript()" id="load-btn" class="bg-violet-600 hover:bg-violet-700 text-white px-4 rounded-lg font-medium text-xs transition flex items-center gap-2 whitespace-nowrap">
                <span>Load</span>
                <i class="fa-solid fa-bolt"></i>
            </button>
        </div>
        <div id="status-bar" class="text-xs text-center mt-2 text-gray-400 h-4 transition-all opacity-0"></div>
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4 pb-24">
        <div class="flex flex-col gap-1 items-start message-anim">
            <div class="glass-panel px-4 py-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm text-gray-200">
                Hi! Load a YouTube video above, configure your API key in settings, and let's chat about the content.
            </div>
        </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#0f172a] via-[#0f172a] to-transparent z-20">
        <div class="glass-panel p-1.5 rounded-2xl flex items-end gap-2">
            <textarea id="user-input" rows="1" placeholder="Ask about the video..." class="bg-transparent border-none text-sm w-full px-3 py-3 focus:ring-0 text-white placeholder-gray-500 resize-none max-h-32" oninput="autoResize(this)"></textarea>
            <button onclick="sendMessage()" id="send-btn" class="w-10 h-10 rounded-xl bg-white text-violet-900 flex items-center justify-center shrink-0 mb-0.5 hover:bg-gray-200 active:scale-95 transition disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-sm rounded-2xl p-6 relative transform transition-all scale-95 opacity-0" id="modal-content">
            <button onclick="toggleSettings()" class="absolute top-4 right-4 text-gray-400 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-sliders text-violet-400"></i> Configuration
            </h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">OpenRouter API Key</label>
                    <input type="password" id="api-key" placeholder="sk-or-..." class="w-full glass-input rounded-lg px-4 py-3 text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Model Name (Manual)</label>
                    <input type="text" id="model-name" placeholder="e.g. google/gemini-2.0-flash-lite-preview-02-05:free" class="w-full glass-input rounded-lg px-4 py-3 text-sm font-mono text-violet-300">
                    <p class="text-[10px] text-gray-500 mt-1">Check OpenRouter for exact model IDs.</p>
                </div>

                <button onclick="saveSettings()" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold py-3 rounded-lg mt-4 transition active:scale-95">
                    Save Configuration
                </button>
                
                <p class="text-[10px] text-center text-gray-600">Keys are stored locally in your browser.</p>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let videoContext = "";
        let isFetching = false;
        
        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('or_api_key');
            const savedModel = localStorage.getItem('or_model_name');
            
            if (savedKey) document.getElementById('api-key').value = savedKey;
            if (savedModel) document.getElementById('model-name').value = savedModel;
            
            // Auto resize textarea
            const input = document.getElementById('user-input');
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        // --- Core Logic: Fetch Transcript (The Hack) ---
        async function loadTranscript() {
            const urlInput = document.getElementById('yt-url');
            const loadBtn = document.getElementById('load-btn');
            const statusBar = document.getElementById('status-bar');
            
            const url = urlInput.value.trim();
            if (!url) {
                showStatus("Please enter a URL", "text-red-400");
                return;
            }

            // UI Loading State
            loadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            loadBtn.disabled = true;
            showStatus("Hacking transcript via Jina...", "text-blue-400");

            try {
                // The Jina Hack
                const jinaUrl = `https://r.jina.ai/${url}`;
                const response = await fetch(jinaUrl);
                
                if (!response.ok) throw new Error("Failed to fetch transcript");
                
                const text = await response.text();
                
                // Simple validation to check if we got content or an error page
                if (text.length < 100 || text.includes("404 Not Found")) {
                    throw new Error("Video not found or no transcript available");
                }

                videoContext = text;
                showStatus("Transcript loaded! AI is ready.", "text-green-400");
                
                // Visual confirmation
                urlInput.value = "";
                urlInput.placeholder = "Video Context Loaded ✅";
                addSystemMessage("Video transcript successfully loaded. You can now ask questions about the video content.");

            } catch (error) {
                console.error(error);
                showStatus("Error: " + error.message, "text-red-400");
            } finally {
                loadBtn.innerHTML = '<span>Load</span><i class="fa-solid fa-bolt"></i>';
                loadBtn.disabled = false;
            }
        }

        // --- Core Logic: OpenRouter Chat ---
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const question = inputField.value.trim();
            const apiKey = localStorage.getItem('or_api_key');
            const modelName = localStorage.getItem('or_model_name');

            if (!question) return;
            
            // Validation
            if (!apiKey || !modelName) {
                toggleSettings();
                showStatus("Please configure API Key & Model first!", "text-red-400");
                return;
            }
            if (!videoContext) {
                showStatus("Please load a video URL first!", "text-yellow-400");
                return;
            }

            // UI Updates
            inputField.value = '';
            inputField.style.height = 'auto';
            appendMessage('user', question);
            
            const loaderId = appendLoader();
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // Required by OpenRouter
                        "X-Title": "YT Chat Hacker"
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [
                            {
                                role: "system",
                                content: "You are a helpful assistant analyzing a YouTube video transcript. Keep answers concise and strictly related to the video content."
                            },
                            {
                                role: "user",
                                content: `CONTEXT (Video Transcript):\n${videoContext.substring(0, 100000)} \n\nUSER QUESTION:\n${question}`
                            }
                        ]
                    })
                });

                const data = await response.json();

                // Remove loader
                document.getElementById(loaderId).remove();

                if (data.error) {
                    throw new Error(data.error.message || "API Error");
                }

                const aiContent = data.choices?.[0]?.message?.content || "No response received.";
                appendMessage('ai', aiContent);

            } catch (error) {
                document.getElementById(loaderId)?.remove();
                appendMessage('ai', `**Error:** ${error.message}. Check your settings or the model name.`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // --- UI Helper Functions ---

        function appendMessage(role, text) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex flex-col gap-1 ${role === 'user' ? 'items-end' : 'items-start'} message-anim`;
            
            // Markdown parsing for AI, simple text for User
            const contentHtml = role === 'ai' ? marked.parse(text) : text.replace(/\n/g, '<br>');
            
            const bubbleColor = role === 'user' 
                ? 'bg-violet-600 text-white rounded-tr-none' 
                : 'glass-panel text-gray-200 rounded-tl-none';

            div.innerHTML = `
                <div class="${bubbleColor} px-4 py-3 rounded-2xl max-w-[85%] text-sm prose prose-invert">
                    ${contentHtml}
                </div>
            `;
            
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = "flex justify-center my-4 message-anim";
            div.innerHTML = `<span class="text-xs text-gray-500 bg-black/20 px-3 py-1 rounded-full border border-white/5">${text}</span>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendLoader() {
            const chatContainer = document.getElementById('chat-container');
            const id = 'loader-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex flex-col gap-1 items-start message-anim";
            div.innerHTML = `
                <div class="glass-panel px-4 py-3 rounded-2xl rounded-tl-none text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-violet-400"></i> Thinking...
                </div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
            return id;
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        function showStatus(msg, colorClass) {
            const sb = document.getElementById('status-bar');
            sb.textContent = msg;
            sb.className = `text-xs text-center mt-2 h-4 transition-all opacity-100 ${colorClass}`;
            setTimeout(() => { sb.classList.add('opacity-0'); }, 4000);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // --- Settings Modal Logic ---
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            const content = document.getElementById('modal-content');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // Small timeout for animation
                setTimeout(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        function saveSettings() {
            const key = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-name').value.trim();
            
            if(key) localStorage.setItem('or_api_key', key);
            if(model) localStorage.setItem('or_model_name', model);
            
            toggleSettings();
            showStatus("Settings saved successfully!", "text-green-400");
        }
    </script>
</body>
</html>
