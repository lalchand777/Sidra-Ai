<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Magic Eraser Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.2.0/dist/browser/imglyRemoveBackground.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --neon-green: #00ff88;
      --neon-purple: #bf00ff;
      --neon-cyan: #00e5ff;
      --dark-bg: #07070d;
      --card-bg: #0e0e1a;
      --border-glow: rgba(0, 255, 136, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark-bg);
      font-family: 'Share Tech Mono', monospace;
      color: #c8d0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(191,0,255,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 8s ease-in-out infinite alternate;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0); }
      100% { transform: translate(15%, 10%); }
    }

    .glow-orb-2 {
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb2 10s ease-in-out infinite alternate;
    }

    @keyframes floatOrb2 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-10%, -15%); }
    }

    .main-wrapper {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      padding: 32px 0 24px;
      position: relative;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.3);
      border-radius: 100px;
      padding: 4px 14px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--neon-green);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(20px, 6vw, 28px);
      line-height: 1.1;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffffff 0%, var(--neon-green) 50%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,255,136,0.4));
    }

    .header-sub {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(200,208,224,0.4);
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid rgba(0,255,136,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
      opacity: 0.5;
    }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2px dashed rgba(0,255,136,0.25);
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      background: rgba(0,255,136,0.02);
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--neon-green);
      background: rgba(0,255,136,0.06);
      box-shadow: 0 0 30px rgba(0,255,136,0.1), inset 0 0 30px rgba(0,255,136,0.03);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(0,255,136,0.5));
    }

    .upload-title {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--neon-green);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .upload-sub {
      font-size: 11px;
      color: rgba(200,208,224,0.4);
      letter-spacing: 1px;
    }

    .upload-formats {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .fmt-tag {
      background: rgba(191,0,255,0.12);
      border: 1px solid rgba(191,0,255,0.3);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      color: #d580ff;
      letter-spacing: 1px;
    }

    /* ── STATUS ── */
    .status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 12px;
    }

    .status-bar.visible { display: flex; }

    .status-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,229,255,0.2);
      border-top-color: var(--neon-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 12px;
      color: var(--neon-cyan);
      letter-spacing: 0.5px;
      line-height: 1.4;
    }

    /* ── ERROR ── */
    .error-bar {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255, 50, 80, 0.08);
      border: 1px solid rgba(255, 50, 80, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 12px;
    }

    .error-bar.visible { display: flex; }
    .error-icon { font-size: 16px; flex-shrink: 0; }
    .error-text { font-size: 12px; color: #ff6080; line-height: 1.5; }

    /* ── BUTTON ── */
    .btn-remove {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #00c864 0%, #00ff88 50%, #00e5c0 100%);
      color: #07070d;
      box-shadow: 0 0 30px rgba(0,255,136,0.4), 0 4px 15px rgba(0,0,0,0.4);
      margin-top: 12px;
    }

    .btn-remove::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-remove:hover::before { left: 100%; }

    .btn-remove:hover:not(:disabled) {
      box-shadow: 0 0 50px rgba(0,255,136,0.6), 0 4px 20px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }

    .btn-remove:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      display: none;
      margin-top: 10px;
    }

    .progress-wrap.visible { display: block; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(200,208,224,0.5);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      border-radius: 2px;
      transition: width 0.4s ease;
      box-shadow: 0 0 10px var(--neon-cyan);
      width: 0%;
    }

    /* ── PREVIEW SECTION ── */
    .preview-section {
      display: none;
    }

    .preview-section.visible { display: block; }

    .preview-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(200,208,224,0.4);
      margin-bottom: 8px;
    }

    .preview-label span {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .preview-img-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      background: repeating-conic-gradient(#1a1a2e 0% 25%, #12122a 0% 50%) 0 0 / 16px 16px;
    }

    .preview-img-wrap img {
      width: 100%;
      display: block;
      max-height: 300px;
      object-fit: contain;
    }

    .preview-before .preview-img-wrap {
      background: #0e0e1a;
    }

    /* Divider */
    .preview-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,136,0.2), transparent);
    }

    .divider-icon {
      font-size: 18px;
      filter: drop-shadow(0 0 8px var(--neon-green));
    }

    /* ── DOWNLOAD BUTTON ── */
    .btn-download {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(191,0,255,0.5);
      background: rgba(191,0,255,0.1);
      color: #d580ff;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
      box-shadow: 0 0 20px rgba(191,0,255,0.15);
    }

    .btn-download:hover {
      background: rgba(191,0,255,0.2);
      border-color: var(--neon-purple);
      box-shadow: 0 0 40px rgba(191,0,255,0.3);
      transform: translateY(-1px);
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 16px 0;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(200,208,224,0.2);
      text-transform: uppercase;
    }

    /* ── SCAN LINE EFFECT ── */
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15), transparent);
      animation: scanline 6s linear infinite;
      pointer-events: none;
      z-index: 999;
    }

    /* Success flash */
    @keyframes successFlash {
      0% { box-shadow: 0 0 0 rgba(0,255,136,0); }
      50% { box-shadow: 0 0 60px rgba(0,255,136,0.5), inset 0 0 30px rgba(0,255,136,0.05); }
      100% { box-shadow: 0 0 0 rgba(0,255,136,0); }
    }

    .card.flash {
      animation: successFlash 1s ease;
    }
  </style>
</head>
<body>

  <div class="scanline"></div>
  <div class="glow-orb-2"></div>

  <div class="main-wrapper">

    <!-- HEADER -->
    <div class="header">
      <div class="header-badge">
        <div class="badge-dot"></div>
        100% Offline AI
      </div>
      <h1>Magic Eraser Pro</h1>
      <p class="header-sub">Neural Background Removal</p>
    </div>

    <!-- UPLOAD CARD -->
    <div class="card" id="uploadCard">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" />
        <span class="upload-icon">🖼️</span>
        <div class="upload-title">Upload Image</div>
        <div class="upload-sub">Tap to select or drag & drop</div>
        <div class="upload-formats">
          <span class="fmt-tag">JPG</span>
          <span class="fmt-tag">PNG</span>
          <span class="fmt-tag">WEBP</span>
          <span class="fmt-tag">BMP</span>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar" id="statusBar">
        <div class="status-spinner"></div>
        <div class="status-text" id="statusText">Initializing...</div>
      </div>

      <!-- Error Bar -->
      <div class="error-bar" id="errorBar">
        <span class="error-icon">⚠️</span>
        <div class="error-text" id="errorText">Something went wrong.</div>
      </div>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label">
          <span>PROCESSING</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Action Button -->
      <button class="btn-remove" id="btnRemove" disabled>
        ✦ Remove Background 🪄
      </button>
    </div>

    <!-- PREVIEW CARD -->
    <div class="card preview-section" id="previewSection">

      <!-- BEFORE -->
      <div class="preview-before">
        <div class="preview-label">
          <span style="background:#555;"></span> Original
        </div>
        <div class="preview-img-wrap">
          <img id="imgBefore" src="" alt="Original" />
        </div>
      </div>

      <!-- AFTER (hidden until done) -->
      <div id="afterSection" style="display:none;">
        <div class="preview-divider">
          <div class="divider-line"></div>
          <span class="divider-icon">⬇️</span>
          <div class="divider-line"></div>
        </div>

        <div class="preview-after">
          <div class="preview-label">
            <span style="background:var(--neon-green);box-shadow:0 0 6px var(--neon-green);"></span> Background Removed
          </div>
          <div class="preview-img-wrap">
            <img id="imgAfter" src="" alt="Result" />
          </div>
        </div>

        <button class="btn-download" id="btnDownload">
          ⬇ Download HD PNG
        </button>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">Powered by @imgly/background-removal · Runs 100% Offline</div>

  </div>

  <script>
    // ─────────────────────────────────────
    // STATE
    // ─────────────────────────────────────
    let currentFile = null;
    let resultBlobUrl = null;

    // ─────────────────────────────────────
    // DOM REFS
    // ─────────────────────────────────────
    const fileInput     = document.getElementById('fileInput');
    const uploadZone    = document.getElementById('uploadZone');
    const btnRemove     = document.getElementById('btnRemove');
    const btnDownload   = document.getElementById('btnDownload');
    const statusBar     = document.getElementById('statusBar');
    const statusText    = document.getElementById('statusText');
    const errorBar      = document.getElementById('errorBar');
    const errorText     = document.getElementById('errorText');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressPct   = document.getElementById('progressPct');
    const previewSection= document.getElementById('previewSection');
    const imgBefore     = document.getElementById('imgBefore');
    const imgAfter      = document.getElementById('imgAfter');
    const afterSection  = document.getElementById('afterSection');
    const uploadCard    = document.getElementById('uploadCard');

    // ─────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────
    function showStatus(msg) {
      statusBar.classList.add('visible');
      statusText.textContent = msg;
      errorBar.classList.remove('visible');
    }

    function hideStatus() {
      statusBar.classList.remove('visible');
    }

    function showError(msg) {
      errorBar.classList.add('visible');
      errorText.textContent = msg;
      statusBar.classList.remove('visible');
      progressWrap.classList.remove('visible');
    }

    function setProgress(pct) {
      progressWrap.classList.add('visible');
      const clamped = Math.min(100, Math.max(0, Math.round(pct)));
      progressFill.style.width = clamped + '%';
      progressPct.textContent  = clamped + '%';
    }

    // ─────────────────────────────────────
    // FILE SELECTED
    // ─────────────────────────────────────
    fileInput.addEventListener('change', handleFile);

    function handleFile(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        showError('Please upload a valid image file (JPG, PNG, WEBP, BMP).');
        return;
      }

      currentFile = file;
      errorBar.classList.remove('visible');
      progressWrap.classList.remove('visible');
      afterSection.style.display = 'none';

      // Show before preview
      const reader = new FileReader();
      reader.onload = (ev) => {
        imgBefore.src = ev.target.result;
        previewSection.classList.add('visible');
      };
      reader.readAsDataURL(file);

      btnRemove.disabled = false;

      // Change upload zone UI to show file name
      const nameEl = uploadZone.querySelector('.upload-title');
      const subEl  = uploadZone.querySelector('.upload-sub');
      if (nameEl) nameEl.textContent = file.name.length > 28 ? file.name.slice(0,25) + '...' : file.name;
      if (subEl)  subEl.textContent  = (file.size / 1024 / 1024).toFixed(2) + ' MB · Tap to change';
    }

    // ─────────────────────────────────────
    // DRAG & DROP
    // ─────────────────────────────────────
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('drag-over');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const dt = e.dataTransfer;
      if (dt && dt.files.length) {
        fileInput.files = dt.files;
        handleFile({ target: fileInput });
      }
    });

    // ─────────────────────────────────────
    // REMOVE BACKGROUND
    // ─────────────────────────────────────
    btnRemove.addEventListener('click', async () => {
      if (!currentFile) return;

      // Revoke old URL if any
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }

      btnRemove.disabled = true;
      afterSection.style.display = 'none';
      showStatus('⚙️ Loading AI Model... (first time may take ~30s)');
      setProgress(5);

      try {
        // Check if library is loaded
        if (typeof imglyRemoveBackground !== 'function') {
          throw new Error('AI library failed to load. Check your internet connection and reload.');
        }

        // Config with progress callback
        const config = {
          publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.2.0/dist/browser/',
          progress: (key, current, total) => {
            if (key === 'compute:inference') {
              showStatus('🧠 Processing Image...');
              const pct = total > 0 ? 20 + (current / total) * 75 : 20;
              setProgress(pct);
            } else if (key.startsWith('fetch')) {
              showStatus('⬇️ Loading AI Model... (first time only)');
              const pct = total > 0 ? 5 + (current / total) * 15 : 5;
              setProgress(pct);
            }
          },
        };

        const blob = await imglyRemoveBackground(currentFile, config);

        setProgress(100);
        showStatus('✅ Done!');

        resultBlobUrl = URL.createObjectURL(blob);
        imgAfter.src = resultBlobUrl;
        afterSection.style.display = 'block';

        // Flash success
        uploadCard.classList.remove('flash');
        void uploadCard.offsetWidth;
        uploadCard.classList.add('flash');

        setTimeout(() => {
          hideStatus();
          progressWrap.classList.remove('visible');
        }, 1500);

      } catch (err) {
        console.error('Background removal error:', err);
        showError('❌ Error: ' + (err.message || 'Unknown error. Try a different image.'));
        progressWrap.classList.remove('visible');
      }

      btnRemove.disabled = false;
    });

    // ─────────────────────────────────────
    // DOWNLOAD
    // ─────────────────────────────────────
    btnDownload.addEventListener('click', () => {
      if (!resultBlobUrl) return;
      const a = document.createElement('a');
      a.href = resultBlobUrl;
      const baseName = currentFile
        ? currentFile.name.replace(/\.[^.]+$/, '')
        : 'result';
      a.download = baseName + '_no_bg.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  </script>
</body>
</html>
