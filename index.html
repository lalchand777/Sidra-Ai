<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HINDI AGENCY - Free AI Image Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        input, button {
            padding: 15px;
            width: 80%;
            margin: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #e94560;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #output {
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
        }
        .loading {
            color: #e94560;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI HINDI AGENCY</h1>
        <h2>Browser में फ्री और अनलिमिटेड AI इमेज जनरेटर</h2>
        <p>कोई API नहीं | पूरी तरह फ्री | मोबाइल पर भी चलेगा</p>
        <input type="text" id="prompt" placeholder="अपनी इमेज का प्रॉम्प्ट लिखें..." value="a cute puppy in a garden, 3d style">
        <button id="generateBtn" onclick="generateImage()">Generate Image</button>
        <div id="output"></div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        // मॉडल को ब्राउज़र में लोड करना (Stable Diffusion)
        const generator = await pipeline(
            'text-to-image',
            'stabilityai/stable-diffusion-2-1',  // आप यहाँ कोई भी अनफ़िल्टर्ड मॉडल बाद में लगा सकते हो
            { device: 'webgpu' } // यदि WebGPU उपलब्ध न हो तो 'wasm' यूज़ होगा
        );

        window.generateImage = async function() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');
            
            btn.disabled = true;
            output.innerHTML = '<p class="loading">जादू हो रहा है... कृपया प्रतीक्षा करें ⏳</p>';

            try {
                const result = await generator(prompt, {
                    num_inference_steps: 25,
                    guidance_scale: 7.5,
                });
                // result एक ब्लॉब (blob) होगा, इसे URL में बदलना है
                const imageUrl = URL.createObjectURL(result);
                output.innerHTML = `<img src="${imageUrl}" alt="Generated Image">`;
            } catch (error) {
                output.innerHTML = `<p style="color:red;">कुछ गड़बड़ हो गई: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
