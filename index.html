<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Chat Hacker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0c29; }
        
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .glass-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
        }

        /* Ambient Background blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .blob-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: #764ba2; border-radius: 50%; }
        .blob-2 { bottom: -10%; right: -10%; width: 250px; height: 250px; background: #667eea; border-radius: 50%; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-anim { animation: fadeUp 0.3s ease-out forwards; }
        
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col overflow-hidden relative">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="glass h-16 flex items-center justify-between px-4 z-20 shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-youtube text-red-500 text-xl"></i>
            <h1 class="font-bold text-lg tracking-wide">Video<span class="text-blue-400">Chat</span></h1>
        </div>
        <button id="settingsBtn" class="text-gray-300 hover:text-white transition p-2">
            <i class="fa-solid fa-gear text-lg"></i>
        </button>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col relative z-10">
        
        <div id="setupStage" class="flex-1 flex flex-col items-center justify-center p-6 text-center transition-all duration-300">
            <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
                <i class="fa-solid fa-link text-4xl mb-4 text-blue-400"></i>
                <h2 class="text-2xl font-bold mb-2">Load Video</h2>
                <p class="text-gray-400 text-sm mb-6">Paste a YouTube URL to extract the "soul" of the video.</p>
                
                <input type="text" id="urlInput" placeholder="https://youtube.com/..." 
                    class="glass-input w-full p-3 rounded-lg mb-4 outline-none focus:border-blue-500 transition">
                
                <button id="loadBtn" class="glass-btn w-full py-3 rounded-lg font-bold tracking-wide hover:opacity-90 transition flex items-center justify-center gap-2">
                    <span>Hack Transcript</span>
                    <i class="fa-solid fa-bolt"></i>
                </button>
            </div>
        </div>

        <div id="chatStage" class="hidden flex-1 flex flex-col h-full w-full max-w-2xl mx-auto">
            <div id="chatHistory" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
                <div class="text-center text-xs text-gray-500 mt-2">Session Started</div>
                </div>

            <div class="absolute bottom-0 left-0 w-full glass p-3 pb-6 md:pb-3">
                <form id="chatForm" class="flex gap-2 max-w-2xl mx-auto">
                    <input type="text" id="chatInput" placeholder="Ask about the video..." autocomplete="off"
                        class="glass-input flex-1 p-3 rounded-full px-5 outline-none focus:border-blue-500 transition">
                    <button type="submit" class="glass-btn w-12 h-12 rounded-full flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

        <div id="loader" class="hidden absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loaderText" class="text-blue-300 font-mono text-sm animate-pulse">Initializing Interface...</p>
        </div>
    </main>

    <div id="settingsModal" class="hidden absolute inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass p-6 rounded-xl w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-key text-yellow-500"></i> API Setup
            </h3>
            <p class="text-xs text-gray-400 mb-4">
                Enter your <a href="https://openrouter.ai" target="_blank" class="text-blue-400 underline">OpenRouter Key</a>. 
                It is stored locally on your device.
            </p>
            <label class="block text-xs uppercase text-gray-500 font-bold mb-1">API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." 
                class="glass-input w-full p-2 rounded mb-4 outline-none">
            
            <label class="block text-xs uppercase text-gray-500 font-bold mb-1">Model ID</label>
            <select id="modelSelect" class="glass-input w-full p-2 rounded mb-6 outline-none bg-gray-800">
                <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Recommended)</option>
                <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free)</option>
                <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            </select>

            <div class="flex gap-2">
                <button id="saveSettings" class="glass-btn flex-1 py-2 rounded font-bold">Save</button>
                <button id="closeSettings" class="bg-gray-700 hover:bg-gray-600 flex-1 py-2 rounded text-gray-300">Close</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-500/90 text-white px-4 py-2 rounded-lg shadow-lg text-sm hidden z-50 transition-all">
        Error message here
    </div>

    <script>
        /**
         * STATE MANAGEMENT
         */
        const state = {
            apiKey: localStorage.getItem('yt_chat_api_key') || '',
            model: localStorage.getItem('yt_chat_model') || 'google/gemini-2.0-flash-001',
            videoContext: '', // Stores the transcript
            chatHistory: []
        };

        /**
         * DOM ELEMENTS
         */
        const els = {
            setupStage: document.getElementById('setupStage'),
            chatStage: document.getElementById('chatStage'),
            urlInput: document.getElementById('urlInput'),
            loadBtn: document.getElementById('loadBtn'),
            chatHistory: document.getElementById('chatHistory'),
            chatForm: document.getElementById('chatForm'),
            chatInput: document.getElementById('chatInput'),
            loader: document.getElementById('loader'),
            loaderText: document.getElementById('loaderText'),
            settingsModal: document.getElementById('settingsModal'),
            settingsBtn: document.getElementById('settingsBtn'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            modelSelect: document.getElementById('modelSelect'),
            saveSettings: document.getElementById('saveSettings'),
            closeSettings: document.getElementById('closeSettings'),
            toast: document.getElementById('toast')
        };

        // Initialize Settings Inputs
        els.apiKeyInput.value = state.apiKey;
        els.modelSelect.value = state.model;

        /**
         * CORE LOGIC 1: SETTINGS & NAVIGATION
         */
        els.settingsBtn.addEventListener('click', () => {
            els.settingsModal.classList.remove('hidden');
        });

        els.closeSettings.addEventListener('click', () => {
            els.settingsModal.classList.add('hidden');
        });

        els.saveSettings.addEventListener('click', () => {
            const key = els.apiKeyInput.value.trim();
            const model = els.modelSelect.value;
            
            if (!key) {
                showToast('API Key is required!');
                return;
            }

            state.apiKey = key;
            state.model = model;
            localStorage.setItem('yt_chat_api_key', key);
            localStorage.setItem('yt_chat_model', model);
            
            els.settingsModal.classList.add('hidden');
            showToast('Settings Saved', 'bg-green-500/90');
        });

        /**
         * CORE LOGIC 2: FETCH TRANSCRIPT (JINA READER)
         */
        els.loadBtn.addEventListener('click', async () => {
            const url = els.urlInput.value.trim();
            
            if (!state.apiKey) {
                showToast('Please set your OpenRouter API Key first (⚙️)');
                els.settingsModal.classList.remove('hidden');
                return;
            }

            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                showToast('Invalid YouTube URL');
                return;
            }

            setLoading(true, 'Hacking Transcript via Jina...');

            try {
                // The Jina Hack
                const jinaUrl = `https://r.jina.ai/${url}`;
                
                const response = await fetch(jinaUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'text/plain',
                        'X-No-Cache': 'true' // Attempt to bypass cache if needed
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch transcript. Video might be unavailable.');

                let text = await response.text();
                
                // Cleanup Jina boilerplate (Optional but clean)
                // Removes header info Jina sometimes adds to focus on content
                const cleanText = text.replace(/Title:.*?\n/s, '').substring(0, 100000); // Limit chars to prevent massive context costs

                if(cleanText.length < 50) throw new Error('No transcript found or video is empty.');

                state.videoContext = cleanText;
                
                // Transition UI
                els.setupStage.classList.add('hidden');
                els.chatStage.classList.remove('hidden');
                
                // Add System Welcome
                addMessage('assistant', `**Successfully Hacked.**\n\nI have read the transcript. Ask me anything about the video!`);

            } catch (error) {
                console.error(error);
                showToast(error.message || 'Fetch failed. Check URL or CORS.');
            } finally {
                setLoading(false);
            }
        });

        /**
         * CORE LOGIC 3: CHAT & LLM
         */
        els.chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = els.chatInput.value.trim();
            if (!query) return;

            // UI Updates
            els.chatInput.value = '';
            addMessage('user', query);
            
            // Show Typing Indicator
            const typingId = addTypingIndicator();
            scrollToBottom();

            try {
                const response = await fetchOpenRouter(query);
                removeMessage(typingId);
                addMessage('assistant', response);
            } catch (error) {
                removeMessage(typingId);
                addMessage('assistant', `**Error:** ${error.message}. Check your API Key or Quota.`);
            }
        });

        async function fetchOpenRouter(userQuestion) {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${state.apiKey}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href, // OpenRouter requirement
                    "X-Title": "YT Chat Hacker"
                },
                body: JSON.stringify({
                    model: state.model,
                    messages: [
                        {
                            role: "system",
                            content: `You are a helpful AI assistant. You have been provided with the transcript of a YouTube video below. Use this context to answer the user's questions strictly based on the video content. If the answer isn't in the transcript, say so.\n\n--- VIDEO TRANSCRIPT ---\n${state.videoContext}`
                        },
                        ...state.chatHistory.slice(-4), // Context window of last few chats
                        {
                            role: "user",
                            content: userQuestion
                        }
                    ]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }
            
            return data.choices[0].message.content;
        }

        /**
         * UI HELPERS
         */
        function addMessage(role, text) {
            const isUser = role === 'user';
            const div = document.createElement('div');
            div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} msg-anim`;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] rounded-2xl p-4 text-sm leading-relaxed shadow-md ${
                isUser 
                ? 'bg-blue-600 text-white rounded-br-sm' 
                : 'glass text-gray-100 rounded-bl-sm border-none'
            }`;

            // Parse Markdown for AI, Plain text for User
            bubble.innerHTML = isUser ? text : marked.parse(text);

            div.appendChild(bubble);
            els.chatHistory.appendChild(div);
            
            // Save to history state
            state.chatHistory.push({ role, content: text });
            
            scrollToBottom();
            return div.id = 'msg-' + Date.now();
        }

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex w-full justify-start msg-anim';
            div.innerHTML = `
                <div class="glass rounded-2xl p-4 rounded-bl-sm flex gap-1 items-center h-12">
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                </div>
            `;
            els.chatHistory.appendChild(div);
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            els.chatHistory.scrollTop = els.chatHistory.scrollHeight;
        }

        function setLoading(isLoading, text) {
            if (isLoading) {
                els.loaderText.textContent = text;
                els.loader.classList.remove('hidden');
            } else {
                els.loader.classList.add('hidden');
            }
        }

        function showToast(msg, bgClass = 'bg-red-500/90') {
            els.toast.textContent = msg;
            els.toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 ${bgClass} text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50 transition-all`;
            els.toast.classList.remove('hidden');
            setTimeout(() => {
                els.toast.classList.add('hidden');
            }, 3000);
        }

    </script>
</body>
</html>
